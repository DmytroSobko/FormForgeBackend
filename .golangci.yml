run:
  timeout: 5m

linters:
  enable:
    - govet
    - revive
    - ineffassign
    - staticcheck
    - unused
    - errcheck
    - gocritic
    - bodyclose
    - gosec

linters-settings:
  revive:
    severity: warning

  errcheck:
    check-type-assertions: true
    exclude-functions:
      - (net/http.ResponseWriter).Write